kind = "web"
previewPath = "/"
title = "Scratchpad PRO"
version = "1.0.0"
id = "artifacts/scratchpad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24764

[services.development]
run = "pnpm --filter @workspace/scratchpad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scratchpad", "run", "build" ]
publicDir = "artifacts/scratchpad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24764"
BASE_PATH = "/"
